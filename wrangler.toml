name = "api"
main = "src/index.ts"
account_id = "3f3a7e7d6b29f0389b841af63623becd"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Run the OpenSea event sync every 1 minute.
# Set the API key as a secret: pnpm wrangler secret put OPENSEA_API_KEY
[triggers]
crons = ["* * * * *"]


[[routes]]
pattern = "api.10x.meme"
custom_domain = true

# Workers KV — stores aggregated poll totals for fast edge reads.
[[kv_namespaces]]
binding = "WARPLETS_KV"
id = "3f55e9bea2534955b833521a2f5b55e7"

# Cloudflare D1 — durable SQL store for users and individual vote rows.
[[d1_databases]]
binding       = "WARPLETS"
database_name = "warplets"
database_id   = "45a4cc4c-788e-48dd-89bf-7b504b17655d"

[env.dev]
name = "api-dev"
main = "src/index.dev.ts"
routes = []
workers_dev = false

[env.dev.vars]
SNAP_PUBLIC_BASE_URL = "https://api-dev.10x.meme"

[[env.dev.kv_namespaces]]
binding = "WARPLETS_KV"
id = "635a084da4ba40e99c3289127178c0a8"

[[env.dev.d1_databases]]
binding       = "WARPLETS"
database_name = "warplets_dev"
database_id   = "e828c5a0-ba86-47c4-93ce-1b34d45a50b0"
