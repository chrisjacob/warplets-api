name: Security Nightly

on:
  schedule:
    - cron: "0 17 * * 0" # Monday 03:00 Australia/Sydney (UTC+10 standard)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Root dependency audit (high+)
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Install app dependencies
        run: pnpm --dir app install --frozen-lockfile

      - name: App dependency audit (high+)
        run: pnpm --dir app audit --audit-level high
        continue-on-error: true

      - name: Root security preflight
        run: pnpm security:preflight

      - name: App security preflight
        run: pnpm --dir app security:preflight
